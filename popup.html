<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>BoxOTP</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <span class="logo">▣</span>
      <span class="brand-name">BoxOTP</span>
    </div>
    <div class="header-actions">
      <button id="qrScanBtn" class="icon-btn" title="QR 코드 스캔 (화면 드래그)">📷</button>
      <button id="viewToggleBtn" class="icon-btn" title="보기 전환">⊞</button>
      <button id="searchBtn" class="icon-btn" title="검색">🔍</button>
      <button id="menuBtn" class="icon-btn" title="메뉴">⋮</button>
    </div>
  </header>

  <div id="searchBar" class="search-bar hidden">
    <input id="searchInput" type="text" placeholder="이름 또는 발급자로 검색…" />
  </div>

  <!-- 메뉴 드롭다운 -->
  <div id="menuDropdown" class="dropdown hidden">
    <button class="dropdown-item" data-action="export-plain">📤 백업 (평문 JSON)</button>
    <button class="dropdown-item" data-action="export-encrypted">🔒 백업 (암호화 JSON)</button>
    <button class="dropdown-item" data-action="export-gauth">📱 Google OTP용 QR 백업</button>
    <div class="dropdown-divider"></div>
    <button class="dropdown-item" data-action="import">📥 복원 (JSON)</button>
    <button class="dropdown-item" data-action="import-txt">📄 TXT 가져오기 (otpauth)</button>
    <div class="dropdown-divider"></div>
    <div class="dropdown-label">🎨 테마</div>
    <button class="dropdown-item theme-item" data-action="theme-dark">
      <span class="theme-swatch" style="background: linear-gradient(135deg, #0f1115 50%, #5eead4 50%);"></span>다크
    </button>
    <button class="dropdown-item theme-item" data-action="theme-light">
      <span class="theme-swatch" style="background: linear-gradient(135deg, #ffffff 50%, #0d9488 50%);"></span>라이트
    </button>
    <button class="dropdown-item theme-item" data-action="theme-sepia">
      <span class="theme-swatch" style="background: linear-gradient(135deg, #f6efe1 50%, #b85c38 50%);"></span>세피아
    </button>
    <button class="dropdown-item theme-item" data-action="theme-midnight">
      <span class="theme-swatch" style="background: linear-gradient(135deg, #0d0b1e 50%, #a78bfa 50%);"></span>미드나잇
    </button>
    <div class="dropdown-divider"></div>
    <button class="dropdown-item danger" data-action="delete-all">🗑️ 전체 삭제</button>
  </div>

  <main id="otpList" class="otp-list">
    <!-- 동적으로 채워짐 -->
  </main>

  <div id="emptyState" class="empty-state hidden">
    <div class="empty-icon">🔐</div>
    <p class="empty-title">등록된 OTP가 없습니다</p>
    <p class="empty-sub">아래 + 버튼을 눌러 추가하세요</p>
  </div>

  <button id="addBtn" class="fab" title="OTP 추가">+</button>

  <!-- 빠른 이름 변경 모달 -->
  <div id="renameModal" class="modal hidden">
    <div class="modal-content modal-sm">
      <div class="modal-header">
        <h2>이름 변경</h2>
        <button id="closeRenameBtn" class="icon-btn">✕</button>
      </div>
      <label class="field">
        <span>이름 (계정)</span>
        <input id="renameLabel" type="text" autocomplete="off" />
      </label>
      <label class="field">
        <span>발급자</span>
        <input id="renameIssuer" type="text" autocomplete="off" />
      </label>
      <div id="renameError" class="form-error hidden"></div>
      <div class="modal-footer">
        <button id="cancelRenameBtn" class="btn btn-ghost">취소</button>
        <button id="confirmRenameBtn" class="btn btn-primary">저장</button>
      </div>
    </div>
  </div>

  <!-- 컨텍스트 메뉴 (타일 우상단 ⋮) -->
  <div id="tileMenu" class="dropdown hidden">
    <button class="dropdown-item" data-act="rename">✏️ 이름 변경</button>
    <button class="dropdown-item" data-act="edit">⚙️ 상세 수정</button>
    <button class="dropdown-item" data-act="move-up">↑ 위로</button>
    <button class="dropdown-item" data-act="move-down">↓ 아래로</button>
    <div class="dropdown-divider"></div>
    <button class="dropdown-item danger" data-act="delete">🗑️ 삭제</button>
  </div>

  <!-- 추가/수정 모달 -->
  <div id="formModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="formTitle">OTP 추가</h2>
        <button id="closeFormBtn" class="icon-btn">✕</button>
      </div>

      <div class="tabs">
        <button class="tab active" data-tab="manual">직접 입력</button>
        <button class="tab" data-tab="uri">URI</button>
        <button class="tab" data-tab="qr">QR 이미지</button>
      </div>

      <!-- 직접 입력 -->
      <div id="tab-manual" class="tab-panel">
        <label class="field">
          <span>이름 (계정)</span>
          <input id="f-label" type="text" placeholder="예: user@example.com" />
        </label>
        <label class="field">
          <span>발급자 (선택)</span>
          <input id="f-issuer" type="text" placeholder="예: Google" />
        </label>
        <label class="field">
          <span>시크릿 키 (Base32)</span>
          <input id="f-secret" type="text" placeholder="JBSWY3DPEHPK3PXP" autocomplete="off" spellcheck="false" />
        </label>
        <details class="advanced">
          <summary>고급 설정</summary>
          <div class="advanced-grid">
            <label class="field-sm">
              <span>자리수</span>
              <select id="f-digits">
                <option value="6" selected>6</option>
                <option value="7">7</option>
                <option value="8">8</option>
              </select>
            </label>
            <label class="field-sm">
              <span>주기(초)</span>
              <select id="f-period">
                <option value="30" selected>30</option>
                <option value="60">60</option>
              </select>
            </label>
            <label class="field-sm">
              <span>알고리즘</span>
              <select id="f-algorithm">
                <option value="SHA1" selected>SHA1</option>
                <option value="SHA256">SHA256</option>
                <option value="SHA512">SHA512</option>
              </select>
            </label>
          </div>
        </details>
      </div>

      <!-- URI -->
      <div id="tab-uri" class="tab-panel hidden">
        <label class="field">
          <span>otpauth:// URI</span>
          <textarea id="f-uri" rows="4" placeholder="otpauth://totp/Issuer:account?secret=...&issuer=..."></textarea>
        </label>
      </div>

      <!-- QR 이미지 -->
      <div id="tab-qr" class="tab-panel hidden">
        <button id="captureScreenBtn" class="btn btn-primary capture-btn">📸 현재 페이지에서 드래그로 캡처</button>
        <div class="or-divider"><span>또는</span></div>
        <label class="field qr-drop" id="qrDropArea">
          <span class="qr-drop-label">QR 코드 이미지를 클릭하거나 끌어다 놓기</span>
          <input id="f-qr-file" type="file" accept="image/*" hidden />
          <canvas id="qrPreview" class="qr-preview hidden"></canvas>
          <div id="qrStatus" class="qr-status"></div>
        </label>
      </div>

      <div id="formError" class="form-error hidden"></div>

      <div class="modal-footer">
        <button id="cancelFormBtn" class="btn btn-ghost">취소</button>
        <button id="saveFormBtn" class="btn btn-primary">저장</button>
      </div>
    </div>
  </div>

  <!-- 비밀번호 입력 모달 (백업 암호화/복원용) -->
  <div id="pwModal" class="modal hidden">
    <div class="modal-content modal-sm">
      <div class="modal-header">
        <h2 id="pwTitle">비밀번호 입력</h2>
        <button id="closePwBtn" class="icon-btn">✕</button>
      </div>
      <label class="field">
        <span id="pwLabel">비밀번호</span>
        <input id="pwInput" type="password" autocomplete="off" />
      </label>
      <div id="pwError" class="form-error hidden"></div>
      <div class="modal-footer">
        <button id="cancelPwBtn" class="btn btn-ghost">취소</button>
        <button id="confirmPwBtn" class="btn btn-primary">확인</button>
      </div>
    </div>
  </div>

  <!-- 확인 모달 -->
  <div id="confirmModal" class="modal hidden">
    <div class="modal-content modal-sm">
      <div class="modal-header">
        <h2 id="confirmTitle">확인</h2>
      </div>
      <p id="confirmMessage" class="confirm-message"></p>
      <div class="modal-footer">
        <button id="cancelConfirmBtn" class="btn btn-ghost">취소</button>
        <button id="okConfirmBtn" class="btn btn-danger">삭제</button>
      </div>
    </div>
  </div>

  <!-- 토스트 -->
  <div id="toast" class="toast hidden"></div>

  <!-- 숨겨진 파일 입력 (백업 복원용) -->
  <input id="importFile" type="file" accept="application/json,.json" hidden />
  <input id="importTxtFile" type="file" accept="text/plain,.txt" hidden />

  <!-- Google Auth QR 백업 모달 -->
  <div id="gauthModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="gauthTitle">Google OTP용 QR 백업</h2>
        <button id="closeGauthBtn" class="icon-btn">✕</button>
      </div>
      <div class="gauth-body">
        <div id="gauthInfo" class="gauth-info"></div>
        <div id="gauthQrWrap" class="gauth-qr-wrap"></div>
        <div class="gauth-pager">
          <button id="gauthPrevBtn" class="btn btn-ghost" disabled>◀ 이전</button>
          <span id="gauthPageLabel" class="gauth-page-label">1 / 1</span>
          <button id="gauthNextBtn" class="btn btn-ghost" disabled>다음 ▶</button>
        </div>
        <details class="advanced">
          <summary>URI 텍스트 보기 / 복사</summary>
          <textarea id="gauthUriText" class="gauth-uri-text" readonly rows="4"></textarea>
          <button id="gauthCopyUriBtn" class="btn btn-ghost gauth-copy-btn">URI 복사</button>
        </details>
        <p class="gauth-hint">Google OTP 앱 → 우측 상단 메뉴 → <b>QR 코드 내보내기 가져오기</b> 또는 <b>계정 가져오기 → QR 스캔</b>으로 스캔하세요.</p>
      </div>
    </div>
  </div>

  <script src="jsqr.js"></script>
  <script src="qrcode.js"></script>
  <script src="totp.js"></script>
  <script src="gauth.js"></script>
  <script src="popup.js"></script>
</body>
</html>
